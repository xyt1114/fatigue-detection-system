{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}疲劳驾驶检测系统{% endblock %}</title>
    <link href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}?v={{ STATIC_VERSION }}" rel="stylesheet">
    <link href="{% static 'css/app.css' %}?v={{ STATIC_VERSION }}" rel="stylesheet">
    <link href="{% static 'css/beautify.css' %}?v={{ STATIC_VERSION }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="app-body beautify-body d-flex flex-column min-vh-100">
    <nav class="navbar app-navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'detection:index' %}">疲劳驾驶检测</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'detection:index' %}">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'detection:upload_detect' %}">上传检测</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'detection:realtime_detect' %}">实时检测</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container my-4 flex-grow-1">
        {% block content %}{% endblock %}
    </main>
    <footer class="app-footer border-top py-3 mt-auto">
        <div class="container text-center text-muted small">
            疲劳驾驶检测系统 · Django + OpenCV + MediaPipe
        </div>
    </footer>
    <script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}?v={{ STATIC_VERSION }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
